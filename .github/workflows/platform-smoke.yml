name: Platform smoke

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: platform-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  environment:
    name: Environment smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Exercise shell discovery and process cleanup
        run: npx playwright test tests/readiness.spec.ts --grep "layers explicit Project overrides|blocks a Run with actionable configured-shell guidance|runs and aborts a Local Task|cleans up an inline command process tree before quitting"
